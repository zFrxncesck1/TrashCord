name: Sync fork with upstream (Equicord)

on:
  schedule:
    - cron: '49 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync fork with upstream (Equicord)
        run: |
          git config user.name "GitHub-Actions"
          git config user.email "actions@github.com"

          cp .github/workflows/build.yml /tmp/build.yml
          cp .github/workflows/publish.yml /tmp/publish.yml
          cp .github/workflows/sync.yml /tmp/sync.yml

          git remote add upstream https://github.com/Equicord/Equicord.git
          git fetch upstream --no-tags
          git checkout main
          git merge upstream/main -m "Sync with upstream [skip ci]"

          cp /tmp/build.yml .github/workflows/build.yml
          cp /tmp/publish.yml .github/workflows/publish.yml
          cp /tmp/sync.yml .github/workflows/sync.yml
          git add .github/workflows/
          git diff --staged --quiet || git commit -m "Restore custom workflows [skip ci]"

          git push https://x-access-token:${{ secrets.ETOKEN }}@github.com/$GITHUB_REPOSITORY.git main
