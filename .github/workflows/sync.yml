name: Sync fork with upstream (Equicord)

on:
  schedule:
    - cron: '47 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync fork with upstream (Equicord)
        run: |
          git config user.name "GitHub-Actions"
          git config user.email "actions@github.com"
          git remote add upstream https://github.com/Equicord/Equicord.git
          git fetch upstream
          git checkout main
          git merge upstream/main -m "Sync with upstream [skip ci]"
          git push https://x-access-token:${{ secrets.ETOKEN }}@github.com/$GITHUB_REPOSITORY.git main
