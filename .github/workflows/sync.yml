name: Sync fork with upstream (Equicord)

on:
  schedule:
    - cron: '15 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync fork with upstream (Equicord)
        run: |
          git remote add upstream https://github.com/Equicord/Equicord.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-ff -m "Sync with upstream [skip ci]" || echo "Nothing to merge"
          git push origin main
